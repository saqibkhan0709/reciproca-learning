<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Editors - RECIPROCA EdiNet</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    background:white;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin-bottom:30px;
}

.header h1{
    font-size:42px;
}

.highlight{
    color:#f4c400;
}

.editor-card{
    background:white;
    border-radius:25px;
    margin-bottom:30px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.video-box video{
    width:100%;
    height:420px;
    object-fit:cover;
    background:#000;
}

.info{
    padding:30px;
}

.info h2{
    font-size:28px;
    margin-bottom:8px;
}

.info p{
    color:#555;
    margin:8px 0;
    line-height:1.5;
}

.badges{
    margin:15px 0;
}

.badge{
    display:inline-block;
    background:#f4c400;
    padding:8px 14px;
    border-radius:20px;
    margin:5px;
    font-weight:bold;
}

.btn{
    display:inline-block;
    background:#f4c400;
    color:black;
    text-decoration:none;
    padding:13px 22px;
    border-radius:12px;
    font-weight:bold;
    margin-right:10px;
    margin-top:15px;
}

.loading{
    text-align:center;
    font-size:20px;
    color:#555;
}

@media(max-width:768px){
    .video-box video{
        height:240px;
    }

    .header h1{
        font-size:32px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Browse <span class="highlight">Editors</span></h1>
        <p>Watch sample work while scrolling and choose the right editor.</p>
    </div>

    <div id="editorsList" class="loading">
        Loading editors...
    </div>

</div>

<script>
const API_URL = "https://reciproca-learning.onrender.com/api/profile/all";

async function loadEditors(){
    const editorsList = document.getElementById("editorsList");

    try{
        const response = await fetch(API_URL);
        const data = await response.json();

        if(!data.success || data.profiles.length === 0){
            editorsList.innerHTML = "No editors found yet.";
            return;
        }

        editorsList.className = "";

        editorsList.innerHTML = data.profiles.map(profile => {

            const video =
            profile.showreelVideo ||
            (profile.sampleVideos && profile.sampleVideos[0]) ||
            "";

            return `
                <div class="editor-card">

                    <div class="video-box">
                        ${
                            video
                            ? `<video muted loop playsinline controls>
                                  <source src="${video}" type="video/mp4">
                               </video>`
                            : `<div style="padding:80px;text-align:center;background:#eee;">
                                  No sample video uploaded
                               </div>`
                        }
                    </div>

                    <div class="info">
                        <h2>${profile.name || "Editor"}</h2>

                        <p><b>Specialization:</b> ${profile.specialization || "Video Editing"}</p>
                        <p><b>Experience:</b> ${profile.experience || "Not added"}</p>
                        <p><b>Pricing:</b> ₹${profile.pricing || "Not added"}</p>
                        <p><b>Country:</b> ${profile.country || "Not added"}</p>
                        <p><b>Languages:</b> ${profile.languages || "Not added"}</p>
                        <p><b>Bio:</b> ${profile.bio || "No bio added"}</p>

                        <div class="badges">
                            <span class="badge">💎 Diamonds: ${profile.diamonds || 0}</span>
                            <span class="badge">⭐ Reputation: ${profile.reputation || 0}</span>
                        </div>

                        <a href="editor-profile-view.html?id=${profile._id}" class="btn">
                            View Profile
                        </a>

                        <a href="hire-requests.html?id=${profile._id}" class="btn">
                            Unlock Contact ₹59
                        </a>
                    </div>

                </div>
            `;
        }).join("");

        observeVideos();

    }catch(error){
        editorsList.innerHTML = "Failed to load editors.";
    }
}

function observeVideos(){
    const videos = document.querySelectorAll("video");

    const observer = new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
            if(entry.isIntersecting){
                entry.target.play().catch(()=>{});
            }else{
                entry.target.pause();
            }
        });
    }, {
        threshold:0.5
    });

    videos.forEach(video=>{
        observer.observe(video);
    });
}

loadEditors();
</script>

</body>
</html>
