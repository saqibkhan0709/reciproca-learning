<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Browse Editors - RECIPROCA EdiNet
    </title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 25px 15px;
            background: #f4f4f4;
            color: #000;
        }

        .page-container {
            width: 100%;
            max-width: 1100px;
            margin: auto;
        }

        .header {
            padding: 35px 20px;
            margin-bottom: 28px;
            border-radius: 24px;
            background: #fff;
            text-align: center;
            box-shadow:
                0 8px 25px rgba(0,0,0,0.08);
        }

        .header h1 {
            margin: 0 0 10px;
            font-size: 42px;
        }

        .highlight {
            color: #f4c400;
        }

        .header p {
            margin: 0;
            color: #666;
        }

        .navigation {
            margin-top: 22px;
        }

        .navigation a {
            display: inline-block;
            margin: 5px 8px;
            color: #000;
            text-decoration: none;
            font-weight: bold;
        }

        .editor-card {
            margin-bottom: 30px;
            border-radius: 25px;
            overflow: hidden;
            background: #fff;
            box-shadow:
                0 8px 28px rgba(0,0,0,0.09);
        }

        .media-section {
            min-height: 300px;
            background: #ececec;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sample-video {
            width: 100%;
            height: 500px;
            object-fit: contain;
            background: #000;
        }

        .no-video {
            min-height: 300px;
            width: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .no-video-icon {
            font-size: 55px;
            margin-bottom: 12px;
        }

        .profile-information {
            padding: 32px 38px 38px;
        }

        .editor-heading {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
        }

        .profile-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f4c400;
            background: #eee;
            flex-shrink: 0;
        }

        .photo-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #f4c400;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 37px;
            flex-shrink: 0;
        }

        .editor-title h2 {
            margin: 0 0 6px;
            font-size: 30px;
        }

        .username {
            margin: 0;
            color: #777;
        }

        .detail {
            margin: 9px 0;
            color: #444;
            font-size: 17px;
            line-height: 1.6;
        }

        .skill-badge {
            display: inline-block;
            margin: 6px 5px 5px 0;
            padding: 8px 13px;
            border: 1px solid #f4c400;
            border-radius: 20px;
            background: #fff4bf;
            font-size: 14px;
            font-weight: bold;
        }

        .reward-badge {
            display: inline-block;
            margin: 18px 8px 5px 0;
            padding: 10px 16px;
            border-radius: 24px;
            background: #f4c400;
            font-weight: bold;
        }

        .button-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 25px;
        }

        .button {
            display: inline-block;
            padding: 14px 22px;
            border-radius: 12px;
            background: #f4c400;
            color: #000;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
        }

        .status-message {
            padding: 45px 20px;
            border-radius: 20px;
            background: #fff;
            text-align: center;
            font-weight: bold;
        }

        @media(max-width: 700px) {
            .header h1 {
                font-size: 32px;
            }

            .sample-video {
                height: 300px;
            }

            .profile-information {
                padding: 25px 20px 30px;
            }

            .profile-photo,
            .photo-placeholder {
                width: 72px;
                height: 72px;
            }

            .editor-title h2 {
                font-size: 24px;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="page-container">

    <div class="header">

        <h1>
            Browse
            <span class="highlight">
                Editors
            </span>
        </h1>

        <p>
            Watch editor samples and choose the right
            talent for your project.
        </p>

        <div class="navigation">
            <a href="index.html">Home</a>
            <a href="new-register.html">Editor Registration</a>
            <a href="login.html">Editor Login</a>
        </div>

    </div>

    <div id="editorsList">

        <div class="status-message">
            Loading editor profiles...
        </div>

    </div>

</div>

<script>
    const editorsList =
        document.getElementById(
            "editorsList"
        );

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function createMediaUrl(filePath) {
        if (!filePath) {
            return "";
        }

        if (
            filePath.startsWith("http://") ||
            filePath.startsWith("https://")
        ) {
            return filePath;
        }

        if (!filePath.startsWith("/")) {
            filePath = "/" + filePath;
        }

        return window.location.origin +
            filePath;
    }

    function getList(value) {
        if (Array.isArray(value)) {
            return value.filter(Boolean);
        }

        if (typeof value === "string") {
            return value
                .split(",")
                .map(function (item) {
                    return item.trim();
                })
                .filter(Boolean);
        }

        return [];
    }

    function createEditorCard(profile) {
        const fullName =
            profile.fullName ||
            profile.name ||
            "RECIPROCA Editor";

        const username =
            profile.username ||
            "";

        const profilePhoto =
            createMediaUrl(
                profile.profilePhoto
            );

        const skills =
            getList(profile.skills);

        const languages =
            getList(profile.languages);

        const sampleWorks =
            Array.isArray(profile.sampleWorks)
                ? profile.sampleWorks
                : [];

        const firstSample =
            sampleWorks[0];

        const videoUrl =
            firstSample
                ? createMediaUrl(
                    firstSample.videoUrl
                )
                : "";

        const skillsHtml =
            skills.length
                ? skills
                    .map(function (skill) {
                        return `
                            <span class="skill-badge">
                                ${escapeHtml(skill)}
                            </span>
                        `;
                    })
                    .join("")
                : `
                    <span class="skill-badge">
                        Video Editing
                    </span>
                `;

        return `
            <article class="editor-card">

                <div class="media-section">

                    ${
                        videoUrl
                            ? `
                                <video
                                    class="sample-video autoplay-video"
                                    muted
                                    loop
                                    playsinline
                                    controls
                                    preload="metadata"
                                >
                                    <source
                                        src="${escapeHtml(
                                            videoUrl
                                        )}"
                                    >
                                </video>
                            `
                            : `
                                <div class="no-video">

                                    <div class="no-video-icon">
                                        🎬
                                    </div>

                                    <strong>
                                        No sample video uploaded
                                    </strong>

                                </div>
                            `
                    }

                </div>

                <div class="profile-information">

                    <div class="editor-heading">

                        ${
                            profilePhoto
                                ? `
                                    <img
                                        src="${escapeHtml(
                                            profilePhoto
                                        )}"
                                        class="profile-photo"
                                        alt="${escapeHtml(
                                            fullName
                                        )}"
                                    >
                                `
                                : `
                                    <div class="photo-placeholder">
                                        🎬
                                    </div>
                                `
                        }

                        <div class="editor-title">

                            <h2>
                                ${escapeHtml(fullName)}
                            </h2>

                            <p class="username">
                                @${escapeHtml(username)}
                            </p>

                        </div>

                    </div>

                    <p class="detail">
                        <strong>Experience:</strong>
                        ${Number(
                            profile.experience || 0
                        )} years
                    </p>

                    <p class="detail">
                        <strong>Starting Price:</strong>
                        ₹${Number(
                            profile.pricing || 0
                        )}
                    </p>

                    <p class="detail">
                        <strong>Country:</strong>
                        ${escapeHtml(
                            profile.country ||
                            "Not added"
                        )}
                    </p>

                    <p class="detail">
                        <strong>Languages:</strong>
                        ${escapeHtml(
                            languages.length
                                ? languages.join(", ")
                                : "Not added"
                        )}
                    </p>

                    <p class="detail">
                        <strong>Bio:</strong>
                        ${escapeHtml(
                            profile.bio ||
                            "No bio added."
                        )}
                    </p>

                    <div>
                        ${skillsHtml}
                    </div>

                    <div>

                        <span class="reward-badge">
                            💎 Diamonds:
                            ${Number(
                                profile.diamondCount || 0
                            )}
                        </span>

                        <span class="reward-badge">
                            ⭐ Reputation:
                            ${Number(
                                profile.reputationPoints || 0
                            )}
                        </span>

                    </div>

                    <div class="button-section">

                        <a
                            href="editor-profile-view.html?username=${encodeURIComponent(
                                username
                            )}"
                            class="button"
                        >
                            View Profile
                        </a>

                        <a
                            href="hire-requests.html?id=${encodeURIComponent(
                                profile._id
                            )}"
                            class="button"
                        >
                            Unlock Contact ₹59
                        </a>

                    </div>

                </div>

            </article>
        `;
    }

    function activateVideoAutoplay() {
        const videos =
            document.querySelectorAll(
                ".autoplay-video"
            );

        const observer =
            new IntersectionObserver(
                function (entries) {
                    entries.forEach(
                        function (entry) {
                            const video =
                                entry.target;

                            if (
                                entry.isIntersecting &&
                                entry.intersectionRatio >= 0.55
                            ) {
                                document
                                    .querySelectorAll(
                                        ".autoplay-video"
                                    )
                                    .forEach(
                                        function (
                                            otherVideo
                                        ) {
                                            if (
                                                otherVideo !==
                                                video
                                            ) {
                                                otherVideo.pause();
                                            }
                                        }
                                    );

                                video
                                    .play()
                                    .catch(function () {});
                            } else {
                                video.pause();
                            }
                        }
                    );
                },
                {
                    threshold: [
                        0,
                        0.25,
                        0.55,
                        0.75,
                        1
                    ]
                }
            );

        videos.forEach(function (video) {
            observer.observe(video);
        });
    }

    async function loadEditors() {
        try {
            const response = await fetch(
                "/api/profile/all",
                {
                    cache: "no-store",
                    headers: {
                        Accept:
                            "application/json"
                    }
                }
            );

            const data =
                await response.json();

            if (!response.ok) {
                throw new Error(
                    data.message ||
                    "Unable to load editors"
                );
            }

            const editors =
                Array.isArray(data.editors)
                    ? data.editors
                    : Array.isArray(data.profiles)
                        ? data.profiles
                        : [];

            if (!editors.length) {
                editorsList.innerHTML = `
                    <div class="status-message">
                        No editor profiles are available.
                    </div>
                `;

                return;
            }

            editorsList.innerHTML =
                editors
                    .map(createEditorCard)
                    .join("");

            activateVideoAutoplay();

        } catch (error) {
            console.error(error);

            editorsList.innerHTML = `
                <div class="status-message">
                    Failed to load editor profiles.
                </div>
            `;
        }
    }

    loadEditors();
</script>

</body>
</html>
