<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Create Editor Profile - RECIPROCA EdiNet
    </title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 30px 15px;
            background: #f4f4f4;
            color: #000;
        }

        .container {
            width: 100%;
            max-width: 730px;
            margin: auto;
            background: #fff;
            padding: 38px;
            border-radius: 25px;
            box-shadow:
                0 8px 28px rgba(0, 0, 0, 0.09);
        }

        h1 {
            text-align: center;
            margin: 0 0 7px;
        }

        .subtitle {
            text-align: center;
            color: #f4c400;
            font-weight: bold;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 17px;
            margin-bottom: 7px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 11px;
            font-size: 15px;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .photo-section {
            padding: 24px;
            border: 2px dashed #ddd;
            border-radius: 20px;
            background: #fafafa;
            text-align: center;
        }

        .photo-preview {
            display: none;
            width: 145px;
            height: 145px;
            margin: 0 auto 18px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #f4c400;
            background: #eee;
        }

        .photo-placeholder {
            width: 145px;
            height: 145px;
            margin: 0 auto 18px;
            border-radius: 50%;
            border: 5px solid #f4c400;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .note {
            margin-top: 10px;
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            border: none;
            border-radius: 12px;
            background: #f4c400;
            color: #000;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            line-height: 1.5;
        }

        .home-link {
            display: block;
            margin-top: 22px;
            text-align: center;
            text-decoration: none;
            color: #000;
            font-weight: bold;
        }

        @media(max-width: 600px) {
            .container {
                padding: 26px 18px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Create Editor Profile</h1>

    <div class="subtitle">
        RECIPROCA EdiNet
    </div>

    <form id="profileForm">

        <div class="photo-section">

            <div
                id="photoPlaceholder"
                class="photo-placeholder"
            >
                🎬
            </div>

            <img
                id="photoPreview"
                class="photo-preview"
                alt="Profile photo preview"
            >

            <label for="profilePhoto">
                Choose Profile Picture
            </label>

            <input
                type="file"
                id="profilePhoto"
                accept="image/jpeg,image/png,image/webp"
            >

            <div class="note">
                JPG, PNG or WEBP only. Maximum size: 5 MB.
            </div>

        </div>

        <label for="fullName">
            Full Name
        </label>

        <input
            type="text"
            id="fullName"
            placeholder="Enter your full name"
            required
        >

        <label for="username">
            Unique Username
        </label>

        <input
            type="text"
            id="username"
            placeholder="Example: crystal edits"
            required
        >

        <label for="bio">
            Short Bio
        </label>

        <textarea
            id="bio"
            placeholder="Describe your editing skills and experience"
        ></textarea>

        <label for="skills">
            Skills
        </label>

        <input
            type="text"
            id="skills"
            placeholder="Reels, YouTube, Cinematic, Gaming"
        >

        <label for="experience">
            Experience in Years
        </label>

        <input
            type="number"
            id="experience"
            placeholder="Example: 2"
            min="0"
        >

        <label for="pricing">
            Starting Price
        </label>

        <input
            type="number"
            id="pricing"
            placeholder="Starting price in ₹"
            min="0"
        >

        <label for="country">
            Country
        </label>

        <input
            type="text"
            id="country"
            placeholder="Enter your country"
        >

        <label for="languages">
            Languages
        </label>

        <input
            type="text"
            id="languages"
            placeholder="English, Hindi, Kannada"
        >

        <button
            type="submit"
            id="createButton"
        >
            Create Profile
        </button>

    </form>

    <div id="result"></div>

    <a
        href="index.html"
        class="home-link"
    >
        Return to Home
    </a>

</div>

<script>
    const userId =
        localStorage.getItem("userId");

    const token =
        localStorage.getItem("token");

    const profileForm =
        document.getElementById("profileForm");

    const profilePhotoInput =
        document.getElementById("profilePhoto");

    const photoPreview =
        document.getElementById("photoPreview");

    const photoPlaceholder =
        document.getElementById(
            "photoPlaceholder"
        );

    const createButton =
        document.getElementById("createButton");

    const resultBox =
        document.getElementById("result");

    if (!userId) {
        alert(
            "Please login before creating your editor profile."
        );

        window.location.href =
            "login.html";
    }

    function splitCommaValues(value) {
        return value
            .split(",")
            .map(function (item) {
                return item.trim();
            })
            .filter(Boolean);
    }

    profilePhotoInput.addEventListener(
        "change",
        function () {
            const photoFile =
                profilePhotoInput.files[0];

            if (!photoFile) {
                photoPreview.style.display =
                    "none";

                photoPlaceholder.style.display =
                    "flex";

                return;
            }

            if (photoFile.size > 5 * 1024 * 1024) {
                alert(
                    "Profile photo must be smaller than 5 MB."
                );

                profilePhotoInput.value = "";

                photoPreview.style.display =
                    "none";

                photoPlaceholder.style.display =
                    "flex";

                return;
            }

            const allowedTypes = [
                "image/jpeg",
                "image/png",
                "image/webp"
            ];

            if (
                !allowedTypes.includes(
                    photoFile.type
                )
            ) {
                alert(
                    "Only JPG, PNG and WEBP images are allowed."
                );

                profilePhotoInput.value = "";

                return;
            }

            photoPreview.src =
                URL.createObjectURL(photoFile);

            photoPreview.style.display =
                "block";

            photoPlaceholder.style.display =
                "none";
        }
    );

    profileForm.addEventListener(
        "submit",
        async function (event) {
            event.preventDefault();

            createButton.disabled = true;

            createButton.innerText =
                "Creating Profile...";

            resultBox.style.color = "#000";

            resultBox.innerText =
                "Please wait while your profile is being created.";

            try {
                const profileResponse = await fetch(
                    "/api/profile/create",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json",

                            ...(token
                                ? {
                                    Authorization:
                                        "Bearer " +
                                        token
                                }
                                : {})
                        },

                        body: JSON.stringify({
                            userId,

                            fullName:
                                document
                                    .getElementById(
                                        "fullName"
                                    )
                                    .value
                                    .trim(),

                            username:
                                document
                                    .getElementById(
                                        "username"
                                    )
                                    .value
                                    .trim(),

                            bio:
                                document
                                    .getElementById(
                                        "bio"
                                    )
                                    .value
                                    .trim(),

                            skills:
                                splitCommaValues(
                                    document
                                        .getElementById(
                                            "skills"
                                        )
                                        .value
                                ),

                            experience:
                                Number(
                                    document
                                        .getElementById(
                                            "experience"
                                        )
                                        .value
                                ) || 0,

                            pricing:
                                Number(
                                    document
                                        .getElementById(
                                            "pricing"
                                        )
                                        .value
                                ) || 0,

                            country:
                                document
                                    .getElementById(
                                        "country"
                                    )
                                    .value
                                    .trim(),

                            languages:
                                splitCommaValues(
                                    document
                                        .getElementById(
                                            "languages"
                                        )
                                        .value
                                )
                        })
                    }
                );

                const profileData =
                    await profileResponse.json();

                if (!profileResponse.ok) {
                    throw new Error(
                        profileData.message ||
                        profileData.error ||
                        "Profile creation failed"
                    );
                }

                const profile =
                    profileData.profile;

                localStorage.setItem(
                    "profileId",
                    profile._id
                );

                localStorage.setItem(
                    "username",
                    profile.username
                );

                const photoFile =
                    profilePhotoInput.files[0];

                if (photoFile) {
                    resultBox.innerText =
                        "Profile created. Uploading profile picture...";

                    const photoFormData =
                        new FormData();

                    photoFormData.append(
                        "photo",
                        photoFile
                    );

                    const photoResponse =
                        await fetch(
                            "/api/upload/profile-photo/" +
                            encodeURIComponent(
                                profile._id
                            ),
                            {
                                method: "POST",

                                headers: token
                                    ? {
                                        Authorization:
                                            "Bearer " +
                                            token
                                    }
                                    : {},

                                body: photoFormData
                            }
                        );

                    const photoData =
                        await photoResponse.json();

                    if (!photoResponse.ok) {
                        throw new Error(
                            photoData.message ||
                            photoData.error ||
                            "Profile created, but profile-photo upload failed"
                        );
                    }

                    localStorage.setItem(
                        "profilePhoto",
                        photoData.profilePhoto
                    );
                }

                resultBox.style.color =
                    "green";

                resultBox.innerText =
                    "Profile and profile picture saved successfully. Redirecting to sample upload...";

                setTimeout(function () {
                    window.location.href =
                        "test-upload.html";
                }, 1500);

            } catch (error) {
                console.error(error);

                resultBox.style.color =
                    "red";

                resultBox.innerText =
                    error.message ||
                    "Something went wrong.";

                createButton.disabled =
                    false;

                createButton.innerText =
                    "Create Profile";
            }
        }
    );
</script>

</body>
</html>
