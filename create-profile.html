<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Editor Profile - RECIPROCA</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #fafafa;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h1 {
            color: #000;
            text-align: center;
        }

        .subtitle {
            color: #f4c400;
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        textarea {
            height: 100px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 18px;
            background: #f4c400;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        #result {
            margin-top: 18px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Create Editor Profile</h1>
    <div class="subtitle">RECIPROCA EdiNet</div>

    <form id="profileForm">

        <input type="text" id="fullName" placeholder="Full Name" required>

        <input type="text" id="username" placeholder="Unique Username" required>

        <textarea id="bio" placeholder="Short Bio"></textarea>

        <input type="text" id="skills" placeholder="Skills separated by comma">

        <input type="number" id="experience" placeholder="Experience in years">

        <input type="number" id="pricing" placeholder="Starting Price ₹">

        <input type="text" id="country" placeholder="Country">

        <input type="text" id="languages" placeholder="Languages separated by comma">

        <button type="submit">Create Profile</button>

    </form>

    <div id="result"></div>

</div>

<script>
    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("Please login first");
        window.location.href = "login.html";
    }

    document
        .getElementById("profileForm")
        .addEventListener("submit", async function(event) {

            event.preventDefault();

            const response = await fetch(
                "https://reciproca-learning.onrender.com/api/profile/create",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        userId: userId,
                        fullName: document.getElementById("fullName").value,
                        username: document.getElementById("username").value,
                        bio: document.getElementById("bio").value,
                        skills: document.getElementById("skills").value.split(",").map(item => item.trim()),
                        experience: Number(document.getElementById("experience").value),
                        pricing: Number(document.getElementById("pricing").value),
                        country: document.getElementById("country").value,
                        languages: document.getElementById("languages").value.split(",").map(item => item.trim())
                    })
                }
            );

            const data = await response.json();

            document.getElementById("result").innerText =
                data.message;

            if (data.success === true) {
                localStorage.setItem("profileId", data.profile._id);
                localStorage.setItem("username", data.profile.username);

                setTimeout(() => {
                    window.location.href = "test-upload.html";
                }, 1500);
            }
        });
</script>

</body>
</html>
