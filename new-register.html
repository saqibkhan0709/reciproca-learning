<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RECIPROCA EdiNet - Register</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: #fafafa;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            color: #000;
            margin-bottom: 5px;
        }

        p {
            color: #f4c400;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 18px;
            background: #f4c400;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        #result {
            margin-top: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>RECIPROCA EdiNet</h1>
    <p>Editor Enrollment</p>

    <form id="registerForm">

        <input type="text" id="name" placeholder="Full Name" required>

        <input type="email" id="email" placeholder="Email Address" required>

        <input type="password" id="password" placeholder="Password" required>

        <select id="role">
            <option value="editor">Editor</option>
        </select>

        <button type="submit">Register</button>

    </form>

    <div id="result"></div>

</div>

<script>
document
.getElementById("registerForm")
.addEventListener("submit", async function(event) {

    event.preventDefault();

    const resultBox = document.getElementById("result");
    resultBox.style.color = "black";
    resultBox.innerText = "Registering...";

    try {
        const response = await fetch(
            "https://reciproca-learning.onrender.com/api/auth/register",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: document.getElementById("name").value.trim(),
                    email: document.getElementById("email").value.trim().toLowerCase(),
                    password: document.getElementById("password").value,
                    role: document.getElementById("role").value
                })
            }
        );

        const data = await response.json();

        if (response.ok) {
            resultBox.style.color = "green";
            resultBox.innerText = data.message || "Registration successful. Redirecting to login...";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            resultBox.style.color = "red";
            resultBox.innerText = data.message || "Registration failed";
        }

    } catch (error) {
        resultBox.style.color = "red";
        resultBox.innerText = "Server error. Please try again.";
    }
});
</script>
</body>
</html>
