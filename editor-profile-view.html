<script>
const API_URL = "https://reciproca-learning.onrender.com";

async function loadProfile() {
    try {
        const params = new URLSearchParams(window.location.search);
        const username = params.get("username");

        if (!username) {
            document.body.innerHTML = "<h2>Editor not found</h2>";
            return;
        }

        const response = await fetch(
            `${API_URL}/api/profile/${username}`
        );

        const profile = await response.json();

        if (!profile) {
            document.body.innerHTML = "<h2>Profile not found</h2>";
            return;
        }

        document.getElementById("name").innerText =
            profile.name || "Unknown";

        document.getElementById("username").innerText =
            profile.username || "";

        document.getElementById("bio").innerText =
            profile.bio || "";

        document.getElementById("experience").innerText =
            profile.experience || "0";

        document.getElementById("pricing").innerText =
            profile.pricing || "0";

        document.getElementById("country").innerText =
            profile.country || "";

        document.getElementById("languages").innerText =
            profile.languages || "";

        document.getElementById("skills").innerText =
            profile.skills || "";

        // Sample works section
        const sampleWorksDiv =
            document.getElementById("sampleWorks");

        sampleWorksDiv.innerHTML = "";

        if (
            profile.sampleWorks &&
            profile.sampleWorks.length > 0
        ) {
            profile.sampleWorks.forEach(work => {
                const workCard =
                    document.createElement("div");

                workCard.style.marginBottom = "20px";
                workCard.style.padding = "20px";
                workCard.style.border =
                    "1px solid #ddd";
                workCard.style.borderRadius =
                    "15px";

                workCard.innerHTML = `
                    <h3>${work.title}</h3>
                    <p>${work.description}</p>

                    <video controls width="100%">
                        <source src="${API_URL}${work.video}" type="video/mp4">
                    </video>
                `;

                sampleWorksDiv.appendChild(
                    workCard
                );
            });
        } else {
            sampleWorksDiv.innerHTML =
                "<p>No sample works uploaded yet.</p>";
        }

    } catch (error) {
        console.error(error);
        document.body.innerHTML =
            "<h2>Failed to load profile</h2>";
    }
}

// Razorpay unlock button
function unlockContact() {
    window.open(
        "https://rzp.io/rzp/YJmlfvYz",
        "_blank"
    );
}

loadProfile();
</script>
