<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RECIPROCA Editor Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 30px;
        }

        .profile {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
        }

        h1 {
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            background: black;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            margin: 5px 0;
        }

        .samples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .sample-card {
            background: #fafafa;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        button {
            padding: 12px 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="profile" id="profileBox">
    Loading profile...
</div>

<script>
    const username = "saqibeditor";

    async function loadProfile() {
        const response = await fetch(
            "http://https://reciproca-learning.onrender.com/api/profile/" + username
        );

        const data = await response.json();

        const profile = data.profile;

        let sampleHTML = "";

        if (profile.sampleWorks && profile.sampleWorks.length > 0) {
            profile.sampleWorks.forEach(sample => {
                sampleHTML += `
                    <div class="sample-card">
                        <h3>${sample.title}</h3>
                        <p>${sample.category}</p>

                        <video controls>
                            <source src="http://https://reciproca-learning.onrender.com${sample.videoUrl}">
                        </video>
                    </div>
                `;
            });
        } else {
            sampleHTML = "<p>No sample works uploaded yet.</p>";
        }

        document.getElementById("profileBox").innerHTML = `
            <div class="profile-top">

    <h1>
        ${profile.fullName}
    </h1>

    <div class="subtitle">
        RECIPROCA Editor
    </div>

    <div class="info">

        <p>
            <strong>Username:</strong>
            ${profile.username}
        </p>

        <p>
            <strong>Bio:</strong>
            ${profile.bio}
        </p>

        <p>
            <strong>Experience:</strong>
            ${profile.experience} years
        </p>

        <p>
            <strong>Pricing:</strong>
            ₹${profile.pricing}
        </p>

        <p>
            <strong>Country:</strong>
            ${profile.country}
        </p>

        <p>
            <strong>Languages:</strong>
            ${profile.languages.join(", ")}
        </p>

        <p>
            <strong>Skills:</strong>
            ${profile.skills.join(", ")}
        </p>

    </div>

    <div class="badges">

        <span class="badge">
            💎 ${profile.diamondCount || 0}
            Diamonds
        </span>

        <span class="badge">
            ⭐ ${profile.reputationPoints || 0}
            Reputation
        </span>

    </div>

</div>

<div class="section-title">
    Sample Works
</div>

<div class="section-subtitle">
    Watch editor's previous edits
</div>

<div class="samples">
    ${sampleHTML}
</div>

<button class="unlock-btn">
    Unlock Contact • ₹59
</button>

`;
    }

    loadProfile();
</script>

</body>
</html>
