<!DOCTYPE html>
<html>
<head>
  <title>RECIPROCA Editor Profile</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; padding:40px; }
    .profile { background:white; padding:30px; border-radius:20px; max-width:900px; margin:auto; box-shadow:0 8px 25px #ddd; }
    h1 { color:black; }
    h2 { color:#f4c400; }
    .badge { background:#f4c400; padding:12px 22px; border-radius:25px; display:inline-block; margin:10px; font-weight:bold; }
    .sample-card { border:1px solid #ddd; border-radius:15px; padding:20px; margin-top:20px; }
    video { width:100%; border-radius:12px; background:black; }
    .unlock-btn { width:100%; padding:18px; background:#f4c400; color:black; border:none; border-radius:12px; font-size:20px; font-weight:bold; margin-top:30px; cursor:pointer; }
  </style>
</head>

<body>

<div class="profile" id="profileBox">
  Loading profile...
</div>

<script>
const API_BASE = "https://reciproca-learning.onrender.com";

const params = new URLSearchParams(window.location.search);

const username =
  params.get("username") ||
  localStorage.getItem("username") ||
  "indain-edits";

async function loadProfile() {
  try {
    const res = await fetch(`${API_BASE}/api/profile/${username}`);
    const data = await res.json();

    const profile = data.profile || data.editor || data;

    if (!profile || profile.success === false) {
      document.getElementById("profileBox").innerHTML =
        "<h2>Profile not found</h2><p>Please create profile first.</p>";
      return;
    }

    let samples = "";

    if (profile.sampleWorks && profile.sampleWorks.length > 0) {
      profile.sampleWorks.forEach(work => {
        const videoPath =
          work.videoUrl ||
          work.video ||
          work.fileUrl ||
          work.url ||
          "";

        samples += `
          <div class="sample-card">
            <h3>${work.title || "Sample Work"}</h3>
            <p>${work.category || work.description || ""}</p>
            <video controls>
              <source src="${API_BASE}${videoPath}" type="video/mp4">
            </video>
          </div>
        `;
      });
    } else {
      samples = "<p>No sample works uploaded yet.</p>";
    }

    document.getElementById("profileBox").innerHTML = `
      <h1>${profile.fullName || profile.name || "RECIPROCA Editor"}</h1>

      <p><b>Username:</b> ${profile.username || username}</p>
      <p><b>Bio:</b> ${profile.bio || "Not added"}</p>
      <p><b>Experience:</b> ${profile.experience || 0} years</p>
      <p><b>Pricing:</b> ₹${profile.pricing || 0}</p>
      <p><b>Country:</b> ${profile.country || "Not added"}</p>
      <p><b>Languages:</b> ${profile.languages || "Not added"}</p>
      <p><b>Skills:</b> ${profile.skills || "Not added"}</p>

      <div class="badge">💎 Diamonds: ${profile.diamondCount || 0}</div>
      <div class="badge">⭐ Reputation: ${profile.reputationPoints || 0}</div>

      <h2>Sample Works</h2>
      ${samples}

      <button class="unlock-btn" onclick="window.open('https://rzp.io/rzp/YJmlfvYz', '_blank')">
    Unlock Contact ₹49
</button>
    `;

  } catch (err) {
    console.error(err);
    document.getElementById("profileBox").innerHTML =
      "<h2>Something went wrong</h2><p>Please try again.</p>";
  }
}

function unlockContact() {
  window.open("https://rzp.io/rzp/YJmlfvYz", "_blank");
}

loadProfile();
</script>

</body>
</html>
