<!DOCTYPE html>
<html>

<head>

<title>Client Bids - RECIPROCA</title>
<link rel="stylesheet" href="styles.css">
<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:40px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:40px;
padding-bottom:50px;
}

.bid-card{
background:#1e293b;
padding:25px;
width:320px;
border-radius:10px;
text-align:left;
}

button{
margin-top:10px;
margin-right:10px;
padding:10px 18px;
background:black;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1e73ff;
}

</style>

</head>

<body>

<h1>Editor Bids</h1>

<div class="container" id="bidContainer"></div>

<script>

const bids = JSON.parse(localStorage.getItem("bids")) || []

const container = document.getElementById("bidContainer")

if(bids.length === 0){

container.innerHTML = "<p>No bids received yet</p>"

}

bids.forEach((bid,index)=>{

const card=document.createElement("div")

card.className="bid-card"

card.innerHTML=`
<h3>Editor Bid</h3>
<p><strong>Price:</strong> ₹${bid.price}</p>
<p><strong>Delivery:</strong> ${bid.time} days</p>
<p><strong>Message:</strong> ${bid.message}</p>

<button onclick="acceptBid(${index})">Accept</button>
<button onclick="rejectBid(${index})">Reject</button>
`

container.appendChild(card)

})

function acceptBid(index){

alert("Bid Accepted!")

}

function rejectBid(index){

let bids = JSON.parse(localStorage.getItem("bids")) || []

bids.splice(index,1)

localStorage.setItem("bids",JSON.stringify(bids))

location.reload()

}

</script>

</body>

</html>
