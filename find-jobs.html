<!DOCTYPE html>
<html>
<head>
<title>Find Jobs</title>
<link rel="stylesheet" href="styles.css">
<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.job{
background:white;
padding:20px;
margin:20px auto;
width:400px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<h2>Available Editing Jobs</h2>

<div id="jobs"></div>

<script>

let jobs=JSON.parse(localStorage.getItem("jobs")) || []

let container=document.getElementById("jobs")

jobs.forEach((job,index)=>{

container.innerHTML+=`

<div class="job">

<h3>${job.title}</h3>

<p>${job.description}</p>

<p><b>Budget:</b> ${job.budget}</p>

<button onclick="applyJob(${index})">Apply</button>

</div>

`

})

function applyJob(index){

let applications=JSON.parse(localStorage.getItem("applications")) || []

applications.push(jobs[index])

localStorage.setItem("applications",JSON.stringify(applications))

alert("Application Sent!")

}

</script>

</body>
</html>
