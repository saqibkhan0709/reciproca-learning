<!DOCTYPE html>
<html>
<head>
<title>Post a Job - RECIPROCA</title>
<link rel="stylesheet" href="styles.css">
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.container{
background:white;
padding:30px;
margin:50px auto;
width:400px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#218838;
}
</style>
</head>

<body>

<div class="container">

<h2>Post Editing Job</h2>

<input id="title" placeholder="Job Title">

<textarea id="description" placeholder="Job Description"></textarea>

<input id="budget" placeholder="Budget">

<button onclick="postJob()">Post Job</button>

<p id="msg"></p>

</div>

<script>

function postJob(){

let title=document.getElementById("title").value
let description=document.getElementById("description").value
let budget=document.getElementById("budget").value

let jobs=JSON.parse(localStorage.getItem("jobs")) || []

jobs.push({
title:title,
description:description,
budget:budget
})

localStorage.setItem("jobs",JSON.stringify(jobs))

document.getElementById("msg").innerHTML="✅ Job Posted Successfully!"

}

</script>

</body>
</html>
